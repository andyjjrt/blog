---
layout: default
---

<div>
  <h2 class="page-heading">Posts</h2>
  <br>
  <ul class="list-group">
    {% for post in site.posts %}
      <a class="list-group-item list-group-item-action" href="{{ post.url | prepend: site.baseurl }}" role="button">
        <h5 class="card-title">{{ post.title }}</h5></p>
        <p class="card-text"><small class="text-muted">{{ post.date | date: "%b %-d, %Y" }}</small></p>
      </a>
    {% endfor %}
  </ul>

</div>
